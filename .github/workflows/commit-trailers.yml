name: Commit trailers

on:
  pull_request:

jobs:
  trailers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by trailers
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"
          ./scripts/check-commit-trailers.sh "${base}..HEAD"
